<!DOCTYPE html>
<html lang="ru">
<head>
    <title>Вход | Liquid Glass Pro</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, 'Helvetica Neue', 'SF Pro Display', system-ui, sans-serif;
            position: relative;
            padding: 20px;
            /* Фолбэк-градиент */
            background: radial-gradient(circle at 30% 30%, #b8d4f0 0%, #8fb3d9 100%);
        }

        /* Фоновое изображение с эффектом матового стекла */
        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            /* Эффект матовости */
            filter: blur(8px) brightness(1.1) saturate(1.2);
            opacity: 0.6;
            transform: scale(1.05);
        }

        /* Если изображение не загрузилось - показываем красивый градиент */
        .bg-fallback {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -3;
            background:
                radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.4) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(180, 220, 255, 0.5) 0%, transparent 45%),
                radial-gradient(circle at 40% 60%, rgba(200, 180, 255, 0.2) 0%, transparent 50%),
                linear-gradient(145deg, #a8c8e8 0%, #d4e6f9 50%, #c5daf5 100%);
            animation: bgBreath 15s infinite alternate ease-in-out;
        }

        @keyframes bgBreath {
            0% { filter: brightness(1) saturate(1); }
            100% { filter: brightness(1.15) saturate(1.3); }
        }

        /* Супер-жидкое стекло контейнера */
        .liquid-glass {
            width: 100%;
            max-width: 440px;
            padding: 42px 36px 48px;
            background: rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border-radius: 64px;
            box-shadow:
                0 40px 80px -20px rgba(0, 0, 0, 0.25),
                0 0 0 1.5px rgba(255, 255, 255, 0.5) inset,
                0 0 30px rgba(255, 255, 255, 0.3) inset,
                0 20px 40px -10px rgba(0, 50, 100, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            z-index: 10;
            color: #1a1a2e;
            transform: translateY(0);
        }

        .liquid-glass:hover {
            box-shadow:
                0 50px 90px -25px rgba(0, 0, 0, 0.3),
                0 0 0 2px rgba(255, 255, 255, 0.6) inset,
                0 0 40px rgba(255, 255, 255, 0.4) inset;
            transform: translateY(-6px);
            background: rgba(255, 255, 255, 0.22);
        }

        /* Дополнительный слой стекла внутри */
        .glass-inner {
            position: relative;
            z-index: 1;
        }

        h2 {
            font-weight: 700;
            font-size: 38px;
            letter-spacing: -0.04em;
            margin-bottom: 32px;
            background: linear-gradient(135deg, #16213e, #0f3460);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 30px rgba(255, 255, 255, 0.5);
            text-align: center;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.05));
        }

        /* Ошибка */
        .glass-error {
            background: rgba(255, 80, 80, 0.15);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            padding: 16px 20px;
            border-radius: 40px;
            margin-bottom: 28px;
            color: #d01030;
            font-weight: 600;
            font-size: 0.95rem;
            border: 1px solid rgba(255, 100, 100, 0.4);
            box-shadow: 0 8px 20px rgba(255, 0, 0, 0.1), 0 0 0 1px rgba(255, 200, 200, 0.2) inset;
            text-align: center;
            animation: shake 0.3s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        /* Группа ввода */
        .input-group {
            margin-bottom: 28px;
            position: relative;
        }

        .input-label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.3px;
            color: rgba(20, 30, 50, 0.8);
            padding-left: 12px;
            text-transform: uppercase;
            backdrop-filter: blur(5px);
        }

        /* Жидкое стекло для инпутов */
        .liquid-input {
            width: 100%;
            padding: 18px 24px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 50px;
            font-size: 1.15rem;
            color: #0a1628;
            font-weight: 500;
            outline: none;
            transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1);
            box-shadow:
                0 8px 20px -8px rgba(0, 0, 0, 0.15),
                0 0 0 1px rgba(255, 255, 255, 0.2) inset;
            letter-spacing: -0.01em;
        }

        .liquid-input::placeholder {
            color: rgba(30, 40, 60, 0.45);
            font-weight: 400;
        }

        .liquid-input:hover {
            background: rgba(255, 255, 255, 0.35);
            border-color: rgba(255, 255, 255, 0.6);
            box-shadow: 0 12px 28px -10px rgba(0, 60, 130, 0.2);
        }

        .liquid-input:focus {
            background: rgba(255, 255, 255, 0.5);
            border-color: rgba(255, 255, 255, 0.9);
            box-shadow:
                0 20px 35px -12px rgba(0, 100, 200, 0.3),
                0 0 0 4px rgba(0, 122, 255, 0.25) inset,
                0 0 0 2px rgba(255, 255, 255, 0.8);
            transform: scale(1.02);
            color: #000c1a;
        }

        /* Кнопка - супер жидкое стекло */
        .liquid-button {
            width: 100%;
            padding: 18px 28px;
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 60px;
            font-size: 1.3rem;
            font-weight: 700;
            color: #0066cc;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow:
                0 20px 35px -12px rgba(0, 80, 160, 0.3),
                0 0 0 1.5px rgba(255, 255, 255, 0.6) inset,
                0 0 20px rgba(255, 255, 255, 0.3) inset;
            margin-top: 16px;
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.8);
            letter-spacing: -0.02em;
            position: relative;
            overflow: hidden;
        }

        .liquid-button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.6);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
            z-index: -1;
        }

        .liquid-button:hover {
            background: rgba(255, 255, 255, 0.55);
            box-shadow:
                0 30px 50px -15px rgba(0, 100, 200, 0.5),
                0 0 0 3px rgba(0, 122, 255, 0.4),
                0 0 0 6px rgba(255, 255, 255, 0.3) inset;
            transform: translateY(-5px) scale(1.02);
            color: #004c99;
            border-color: rgba(255, 255, 255, 0.9);
        }

        .liquid-button:hover::before {
            width: 400px;
            height: 400px;
        }

        .liquid-button:active {
            transform: translateY(2px) scale(0.98);
            transition: all 0.1s;
            box-shadow:
                0 12px 25px -10px rgba(0, 100, 200, 0.4),
                0 0 0 2px rgba(0, 122, 255, 0.3);
        }

        /* Подсказка */
        .hint-glass {
            margin-top: 32px;
            text-align: center;
            font-size: 0.9rem;
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;
            width: 100%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #1e2b4a;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* Адаптив */
        @media (max-width: 480px) {
            .liquid-glass {
                padding: 30px 22px 36px;
                border-radius: 48px;
            }
            h2 { font-size: 32px; }
            .liquid-input { padding: 15px 20px; }
        }

        /* Проверка загрузки фона через JS */
        .no-image .bg-image {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Фоновое изображение (матовое) -->
    <div class="bg-image"></div>
    <!-- Фолбэк-градиент -->
    <div class="bg-fallback"></div>

    <div class="liquid-glass">
        <div class="glass-inner">
            <h2>✨ Вход</h2>

            {% if error %}
            <div class="glass-error">
                ⚡ {{ error }}
            </div>
            {% endif %}

            <form method="POST">
                <div class="input-group">
                    <span class="input-label">Логин</span>
                    <input type="text" name="username" class="liquid-input" placeholder="admin" required autofocus>
                </div>

                <div class="input-group">
                    <span class="input-label">Пароль</span>
                    <input type="password" name="password" class="liquid-input" placeholder="••••••••" required>
                </div>

                <button type="submit" class="liquid-button">Войти →</button>
            </form>

            <div class="hint-glass">
                <span>🔓 admin / admin</span>
            </div>
        </div>
    </div>

    <script>
        // Проверка загрузки фонового изображения
        (function() {
            const img = new Image();
            img.src = 'background.jpg';
            img.onload = function() {
                document.body.classList.remove('no-image');
            };
            img.onerror = function() {
                document.body.classList.add('no-image');
                console.log('✨ Используется градиентный фон (изображение не найдено)');
            };

            // Дополнительный эффект параллакса для фона
            document.addEventListener('mousemove', (e) => {
                const bg = document.querySelector('.bg-image');
                if (bg && !document.body.classList.contains('no-image')) {
                    const x = (e.clientX / window.innerWidth - 0.5) * 10;
                    const y = (e.clientY / window.innerHeight - 0.5) * 10;
                    bg.style.transform = `scale(1.05) translate(${x}px, ${y}px)`;
                }
            });
        })();
    </script>
</body>
</html>
