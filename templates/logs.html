<!DOCTYPE html>
<html lang="ru">
<head>
    <title>Логи | Liquid Glass</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            -webkit-user-select: none;
            user-select: none;
            min-height: 100vh;
            font-family: system-ui, -apple-system, 'Helvetica Neue', 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at 30% 60%, #e3ebf6 0%, #d0ddef 100%);
            background-image:
                radial-gradient(circle at 25% 30%, rgba(255, 255, 255, 0.6) 0%, transparent 35%),
                radial-gradient(circle at 80% 70%, rgba(200, 220, 250, 0.5) 0%, transparent 40%),
                linear-gradient(135deg, #dfe9f3 0%, #f2f7fc 100%);
            padding: 30px 20px;
        }

        .glass-container {
            max-width: 1300px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(28px) saturate(180%);
            -webkit-backdrop-filter: blur(28px) saturate(180%);
            border-radius: 52px;
            padding: 32px 30px;
            box-shadow:
                0 35px 60px -15px rgba(0, 20, 40, 0.15),
                0 0 0 1px rgba(255, 255, 255, 0.6) inset;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        h2 {
            font-weight: 650;
            font-size: 36px;
            letter-spacing: -0.03em;
            margin-bottom: 20px;
            background: linear-gradient(145deg, #1e2b4a, #2c3e6b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .glass-link {
            text-decoration: none;
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(12px);
            border-radius: 50px;
            color: #1e3a5f;
            font-weight: 500;
            transition: all 0.25s;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .glass-link:hover {
            background: rgba(255, 255, 255, 0.65);
            transform: translateY(-2px);
            box-shadow: 0 12px 20px -10px rgba(0,0,0,0.1);
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 36px;
        }

        .glass-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            border-radius: 36px;
        }

        .glass-table th {
            background: rgba(255, 255, 255, 0.4);
            padding: 18px 20px;
            font-weight: 600;
            color: #1e293b;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.6);
        }

        .glass-table td {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.25);
            color: #1f2a41;
            font-weight: 500;
        }

        .glass-table tr:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        @media (max-width: 700px) {
            .glass-container { padding: 20px 16px; }
            h2 { font-size: 30px; }
        }
    </style>
</head>
<body>
<div class="glass-container">
    <h2>📋 Логи разблокировок</h2>
    <div class="nav-links">
        <a href="/admin" class="glass-link">← Назад в админ-панель</a>
        <a href="/scan" class="glass-link">📱 На главную</a>
    </div>

    <div class="table-wrapper">
        <table class="glass-table">
            <thead>
                <tr>
                    <th>📅 Дата/время</th>
                    <th>💻 Компьютер</th>
                    <th>🔑 Код</th>
                    <th>👤 Пользователь</th>
                    <th>📛 Имя Фамилия</th>
                </tr>
            </thead>
            <tbody>
                {% for log in logs %}
                <tr>
                    <td>{{ log.timestamp }}</td>
                    <td><code>{{ log.computer_serial }}</code></td>
                    <td><code>{{ log.session_code }}</code></td>
                    <td>{{ log.username }}</td>
                    <td>{{ log.name }} {{ log.surname }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
