<!DOCTYPE html>
<html lang="ru">
<head>
    <title>Разблокировка | Liquid Glass</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            -webkit-user-select: none;
            user-select: none;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, 'Helvetica Neue', 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at 30% 20%, #e8f0fe 0%, #d4e0f0 100%);
            background-image:
                radial-gradient(circle at 15% 30%, rgba(255, 255, 255, 0.9) 0%, transparent 35%),
                radial-gradient(circle at 85% 70%, rgba(180, 220, 255, 0.6) 0%, transparent 45%),
                linear-gradient(145deg, #c5d5e8 0%, #eef3f9 100%);
            padding: 20px;
            animation: bgFloat 15s infinite alternate ease-in-out;
        }

        @keyframes bgFloat {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        .glass-container {
            width: 100%;
            max-width: 520px;
            padding: 34px 32px 40px;
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(28px) saturate(180%);
            -webkit-backdrop-filter: blur(28px) saturate(180%);
            border-radius: 52px;
            box-shadow:
                0 35px 60px -15px rgba(0, 20, 40, 0.2),
                0 0 0 1px rgba(255, 255, 255, 0.7) inset,
                0 10px 25px -5px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
        }

        .glass-container:hover {
            box-shadow:
                0 40px 70px -12px rgba(0, 30, 60, 0.25),
                0 0 0 1px rgba(255, 255, 255, 0.9) inset;
            transform: translateY(-4px);
        }

        h2 {
            font-weight: 650;
            font-size: 34px;
            letter-spacing: -0.03em;
            margin-bottom: 24px;
            background: linear-gradient(135deg, #1a1f2c, #2c3a5e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 15px rgba(255, 255, 255, 0.6);
        }

        .user-header {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 18px 22px;
            border-radius: 34px;
            margin-bottom: 28px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 15px -5px rgba(0, 0, 0, 0.05);
            transition: all 0.25s ease;
        }

        .user-header:hover {
            background: rgba(255, 255, 255, 0.45);
            box-shadow: 0 12px 20px -8px rgba(0, 60, 120, 0.15);
        }

        .user-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .user-name {
            font-weight: 600;
            font-size: 1.2rem;
            color: #1e293b;
        }

        .badge {
            background: rgba(0, 100, 200, 0.15);
            backdrop-filter: blur(10px);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #0055aa;
            border: 1px solid rgba(0, 120, 255, 0.2);
        }

        .nav-links {
            display: flex;
            gap: 20px;
            margin-top: 8px;
        }

        .nav-links a {
            text-decoration: none;
            color: #2c3e5e;
            font-weight: 500;
            padding: 6px 12px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            transition: all 0.2s ease;
            border: 1px solid transparent;
            font-size: 0.95rem;
        }

        .nav-links a:hover {
            background: rgba(255, 255, 255, 0.5);
            border-color: rgba(255, 255, 255, 0.8);
            transform: translateY(-1px);
            box-shadow: 0 5px 12px -5px rgba(0, 0, 0, 0.1);
        }

        hr {
            margin: 24px 0 20px;
            border: none;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.6), transparent);
        }

        .input-group {
            margin-bottom: 24px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #334155;
            padding-left: 10px;
            font-size: 0.95rem;
            letter-spacing: -0.01em;
        }

        .glass-input {
            width: 100%;
            padding: 16px 22px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1.5px solid rgba(255, 255, 255, 0.6);
            border-radius: 44px;
            font-size: 1.05rem;
            color: #0f172a;
            font-weight: 500;
            outline: none;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1);
            box-shadow: 0 6px 12px -6px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(0,0,0,0.02) inset;
        }

        .glass-input:focus {
            background: rgba(255, 255, 255, 0.75);
            border-color: rgba(255, 255, 255, 1);
            box-shadow:
                0 15px 25px -10px rgba(0, 100, 200, 0.2),
                0 0 0 3px rgba(0, 122, 255, 0.2) inset;
            transform: scale(1.01);
        }

        .glass-input:hover {
            background: rgba(255, 255, 255, 0.55);
            border-color: rgba(255, 255, 255, 0.9);
        }

        .glass-button {
            width: 100%;
            padding: 16px 24px;
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #0066cc;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow:
                0 12px 22px -10px rgba(0, 100, 200, 0.25),
                0 0 0 1px rgba(255, 255, 255, 0.4) inset;
            margin-top: 12px;
            text-shadow: 0 1px 6px rgba(255, 255, 255, 0.7);
        }

        .glass-button:hover {
            background: rgba(255, 255, 255, 0.85);
            box-shadow:
                0 22px 32px -12px rgba(0, 100, 200, 0.35),
                0 0 0 2px rgba(0, 122, 255, 0.3),
                0 0 0 4px rgba(255, 255, 255, 0.2) inset;
            transform: translateY(-3px);
            color: #004c99;
        }

        .glass-button:active {
            transform: translateY(1px) scale(0.98);
            background: rgba(220, 240, 255, 0.95);
        }

        #result {
            margin-top: 24px;
            min-height: 50px;
        }

        .result-message {
            padding: 14px 20px;
            border-radius: 36px;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(12px);
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.5);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .success { color: #0a7143; background: rgba(20, 200, 120, 0.1); border-color: rgba(0, 200, 100, 0.2); }
        .error { color: #c00030; background: rgba(255, 60, 60, 0.1); border-color: rgba(255, 0, 0, 0.15); }

        @media (max-width: 500px) {
            .glass-container { padding: 24px 18px 30px; border-radius: 38px; }
            h2 { font-size: 28px; }
            .user-info { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <div class="glass-container">
        <h2>🔐 Разблокировка</h2>

        <div class="user-header">
            <div class="user-info">
                <span class="user-name">
                    👤 {{ session.name }} {{ session.surname }}
                    {% if session.is_admin %}<span class="badge">Админ</span>{% endif %}
                </span>
                <div class="nav-links">
                    <a href="/logout">🚪 Выйти</a>
                    {% if session.is_admin %}
                    <a href="/admin">⚙️ Админ</a>
                    {% endif %}
                </div>
            </div>
        </div>

        <hr>

        <form id="unlockForm">
            <div class="input-group">
                <label>💻 Серийный номер</label>
                <input type="text" id="serialInput" class="glass-input" placeholder="Serial Number" required>
            </div>

            <div class="input-group">
                <label>🔑 Код разблокировки</label>
                <input type="text" id="codeInput" class="glass-input" placeholder="12345678" required>
            </div>

            <button type="submit" class="glass-button">Разблокировать →</button>
        </form>

        <div id="result"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const serial = urlParams.get('serial');
        const code = urlParams.get('code');

        if (serial && code) {
            document.getElementById('serialInput').value = serial;
            document.getElementById('codeInput').value = code;
            setTimeout(() => {
                document.getElementById('unlockForm').dispatchEvent(new Event('submit'));
            }, 500);
        }

        document.getElementById('unlockForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const serial = document.getElementById('serialInput').value.trim();
            const code = document.getElementById('codeInput').value.trim();
            const resultDiv = document.getElementById('result');

            resultDiv.innerHTML = `<div class="result-message" style="text-align:center;">✨ Проверка кода...</div>`;

            const response = await fetch('/api/verify', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({computer_serial: serial, code: code})
            });

            const data = await response.json();

            resultDiv.innerHTML = `
                <div class="result-message ${data.success ? 'success' : 'error'}">
                    ${data.success ? '✅' : '❌'} ${data.message}
                </div>
            `;

            if (data.success) {
                document.getElementById('unlockForm').reset();
                const container = document.querySelector('.glass-container');
                container.style.transform = 'scale(1.01)';
                setTimeout(() => container.style.transform = '', 200);
            }
        });
    </script>
</body>
</html>
